<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <title>ULM Jobs Login</title>
    <link rel="stylesheet" href="style_s.css">
</head>
<body>
    <div id="logo-section">
        <img src="ulm_logo.png" alt="ULM Jobs Logo" id="logo">
        <div class="text-content">
            <h2 class="loginintro">ULM JOB CONNECT</h2>
            <p class="loginparagraph">Get your on-campus jobs here in ULM !</p>
        </div>
    </div>
    <div id="login-box">
        <h3>Login For Student</h3>
        <form>
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit"><a href="homepage.html">Log In</a></button>
            <p><a href="signbup.html">Create new account</a></p>
        </form>
    </div>
</body>
</html>
